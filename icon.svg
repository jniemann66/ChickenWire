<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="edgeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Hex interior gradient: blue-violet core → lightened navy -->
    <radialGradient id="hexFill" cx="256" cy="256" r="148" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4a5ab8"/>
      <stop offset="85%"  stop-color="#2a2a42"/>
      <stop offset="100%" stop-color="#2a2a42"/>
    </radialGradient>
  </defs>

  <!--
    Flat-top hexagon, circumradius R=170, centre (256,256).
    Vertices at 0°,60°,120°,180°,240°,300° (0° = right):
      Right       (426, 256)  major → orange ring
      Top-right   (341, 109)  minor → blue ring
      Top-left    (171, 109)  major → orange ring
      Left         (86, 256)  minor → blue ring
      Bottom-left (171, 403)  major → orange ring
      Bottom-right(341, 403)  minor → blue ring

    3 diameter edges through centre (each pair of opposite vertices):
      Right ↔ Left        → pink  (P)
      Top-right ↔ Bot-left → orange (R)
      Top-left ↔ Bot-right → blue  (L)
  -->

  <!-- Hex interior fill -->
  <polygon points="426,256 341,109 171,109 86,256 171,403 341,403" fill="url(#hexFill)"/>

  <!-- 3 coloured diameter lines crossing at centre -->
  <line x1="86"  y1="256" x2="426" y2="256" stroke="#e93d9a" stroke-width="11" stroke-linecap="round" filter="url(#edgeGlow)"/>
  <line x1="341" y1="109" x2="171" y2="403" stroke="#f67400" stroke-width="11" stroke-linecap="round" filter="url(#edgeGlow)"/>
  <line x1="171" y1="109" x2="341" y2="403" stroke="#3daee9" stroke-width="11" stroke-linecap="round" filter="url(#edgeGlow)"/>

  <!-- Outer nodes -->
  <circle cx="426" cy="256" r="38" fill="#2a2a42" stroke="#ffffff" stroke-width="9"/>
  <circle cx="341" cy="109" r="38" fill="#2a2a42" stroke="#ffffff" stroke-width="9"/>
  <circle cx="171" cy="109" r="38" fill="#2a2a42" stroke="#ffffff" stroke-width="9"/>
  <circle cx="86"  cy="256" r="38" fill="#2a2a42" stroke="#ffffff" stroke-width="9"/>
  <circle cx="171" cy="403" r="38" fill="#2a2a42" stroke="#ffffff" stroke-width="9"/>
  <circle cx="341" cy="403" r="38" fill="#2a2a42" stroke="#ffffff" stroke-width="9"/>

  <!-- Centre node -->
  <circle cx="256" cy="256" r="52" fill="#4a5ab8" stroke="#ffffff" stroke-width="9"/>
  <text x="256" y="266" text-anchor="middle" dominant-baseline="center" dy="0.15em" font-family="sans-serif" font-size="52" font-weight="bold" fill="#ffffff">C</text>
</svg>
